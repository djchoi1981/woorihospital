<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --kakao: #FEE500;
            --kakao-text: #000000;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 36px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(118, 75, 162, 0.3);
        }

        h1 {
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
        }

        p.desc {
            color: var(--text-muted);
            margin: 0 0 30px 0;
            font-size: 15px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-call {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-call:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-sms {
            background-color: #E0E7FF;
            color: var(--primary);
        }

        .btn-sms:hover {
            background-color: #C7D2FE;
            transform: translateY(-2px);
        }

        .btn-kakao {
            background-color: var(--kakao);
            color: var(--kakao-text);
        }

        .btn-kakao:hover {
            background-color: #F4DC00;
            transform: translateY(-2px);
        }

        .btn svg {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .footer a {
            color: var(--text-muted);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-icon">
        👋
    </div>
    <h1>연락처</h1>
    <p class="desc">아래의 원하시는 방법으로 연락해 주세요.<br>빠르게 확인 후 답변 드리겠습니다.</p>

    <div class="btn-group">
        <a href="tel:{{ info.phone_number }}" class="btn btn-call">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            전화 걸기
        </a>
        
        <a href="sms:{{ info.phone_number }}" class="btn btn-sms">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            문자 보내기
        </a>

        <a href="{{ info.kakao_url }}" target="_blank" class="btn btn-kakao">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 3C6.477 3 2 6.582 2 11c0 2.825 1.763 5.312 4.437 6.818-.21.785-.758 2.83-.87 3.268-.142.548.188.54.4.4.168-.11 2.66-1.803 3.73-2.528.75.143 1.52.218 2.303.218 5.523 0 10-3.582 10-8s-4.477-8-10-8z"/></svg>
            카카오톡 연락하기
        </a>
    </div>

    <div class="footer">
        <a href="/admin">관리자 페이지</a>
    </div>
</div>

</body>
</html>
