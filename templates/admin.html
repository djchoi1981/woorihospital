<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락처 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --success: #10B981;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #E5E7EB;
            padding-bottom: 15px;
        }

        h1 {
            color: var(--text-main);
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        .logout {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
        }
        
        .logout:hover {
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #D1D5DB;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .help-text {
            display: block;
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            background-color: var(--primary);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }
        
        .qr-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #E5E7EB;
            text-align: center;
        }
        
        .qr-section h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        
        .qr-image {
            max-width: 200px;
            height: auto;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 10px;
            background: white;
        }
        
        .link-text {
            font-size: 13px;
            color: var(--primary);
            word-break: break-all;
            margin-top: 10px;
            background: #EEF2FF;
            padding: 8px;
            border-radius: 6px;
        }
    </style>
    <script>
        function showSuccessAlert(e) {
            alert("연락처 정보가 성공적으로 저장되었습니다!");
        }
    </script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>연락처 관리</h1>
        <a href="/logout" class="logout">로그아웃</a>
    </div>

    <form method="POST" action="/admin" onsubmit="setTimeout(showSuccessAlert, 100)">
        <div class="form-group">
            <label for="phone_number">전화번호</label>
            <input type="tel" id="phone_number" name="phone_number" class="form-control" value="{{ info.phone_number }}" placeholder="010-1234-5678" required>
            <span class="help-text">하이픈(-)을 포함하여 입력해주세요.</span>
        </div>

        <div class="form-group">
            <label for="kakao_url">카카오톡 오픈채팅 주소</label>
            <input type="url" id="kakao_url" name="kakao_url" class="form-control" value="{{ info.kakao_url }}" placeholder="https://open.kakao.com/o/..." required>
            <span class="help-text">카카오톡 오픈채팅방에서 복사한 주소를 붙여넣으세요.</span>
        </div>

        <button type="submit" class="btn">저장하기</button>
    </form>
    
    <div class="qr-section">
        <h2>인쇄용 QR 코드</h2>
        <p class="help-text" style="margin-bottom: 20px;">아래 QR 코드를 저장하여 인쇄물에 사용하세요.<br>이 QR 코드는 변경되지 않습니다.</p>
        <img src="/qr_code" alt="QR Code" class="qr-image">
        <div class="link-text">{{ host_url }}</div>
    </div>
</div>

</body>
</html>
