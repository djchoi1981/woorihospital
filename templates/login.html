<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --danger: #EF4444;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        h1 {
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
        }

        p.desc {
            color: var(--text-muted);
            margin: 0 0 30px 0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #D1D5DB;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            background-color: var(--primary);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .error-msg {
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #FEF2F2;
            border-radius: 8px;
            display: {{ 'block' if error else 'none' }};
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
        }
        
        .footer a {
            color: var(--text-muted);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>관리자 로그인</h1>
    <p class="desc">연락처를 수정하려면 로그인하세요.</p>

    <div class="error-msg">
        {{ error }}
    </div>

    <form method="POST" action="/login">
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="btn">로그인</button>
    </form>
    
    <div class="footer">
        <a href="/">&larr; 홈으로 돌아가기</a>
    </div>
</div>

</body>
</html>
