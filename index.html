<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리병원 근무자 연락처</title>
  <style>
    :root {
      --primary-color: #4F46E5;
      --primary-hover: #4338CA;
      --bg-color: #F3F4F6;
      --card-bg: #FFFFFF;
      --text-main: #111827;
      --text-muted: #6B7280;
      --accent-call: #10B981;
      --accent-sms: #3B82F6;
      --accent-kakao: #FBBF24;
      --border-color: #E5E7EB;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      align-items: center;
    }

    .container {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      padding: 30px 20px;
      text-align: center;
      background: linear-gradient(135deg, var(--primary-color), #818CF8);
      color: white;
      position: relative;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .content {
      padding: 30px 20px;
      flex: 1;
    }

    .worker-card {
      text-align: center;
      margin-bottom: 30px;
    }

    .worker-avatar {
      width: 100px;
      height: 100px;
      background: #E0E7FF;
      color: var(--primary-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 15px;
      font-weight: bold;
    }

    .worker-name {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .worker-role {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-call {
      background-color: var(--accent-call);
      color: white;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
    }

    .btn-sms {
      background-color: var(--accent-sms);
      color: white;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
    }

    .btn-kakao {
      background-color: #FEE500;
      color: #000000;
      box-shadow: 0 4px 14px rgba(254, 229, 0, 0.3);
    }

    .admin-link {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
    }

    /* Admin View */
    .admin-view {
      display: none;
      padding: 20px;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 800px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    .admin-header h2 {
      font-size: 1.5rem;
      color: var(--text-main);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 20px;
      background: var(--bg-color);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
    }

    .tab.active {
      background: var(--primary-color);
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: var(--text-main);
      font-size: 0.9rem;
    }

    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
    }

    .btn-danger {
      background: #EF4444;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background: var(--bg-color);
      font-weight: 600;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .schedule-card {
      background: var(--bg-color);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .schedule-card h3 {
      margin-bottom: 10px;
      font-size: 1.1rem;
      text-align: center;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }

    .schedule-slot {
      margin-bottom: 10px;
    }

    .schedule-slot label {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 3px;
    }

    .loading {
      text-align: center;
      padding: 50px;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    .qr-container {
      text-align: center;
      margin-top: 20px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <!-- Public View -->
  <div class="container" id="publicView">
    <div class="header">
      <h1>오늘의 담당 근무자</h1>
      <p id="currentDateDisplay"></p>
    </div>
    <div class="content" id="publicContent">
      <div class="loading">정보를 불러오는 중입니다...</div>
    </div>
    <div class="admin-link" onclick="promptAdmin()">관리자 모드</div>
  </div>

  <!-- Admin View -->
  <div class="admin-view" id="adminView">
    <div class="admin-header">
      <h2>관리자 대시보드</h2>
      <button class="btn-primary" style="width: auto;" onclick="logoutAdmin()">나가기</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('workers')">근무자 관리</button>
      <button class="tab" onclick="switchTab('schedule')">스케줄 관리</button>
      <button class="tab" onclick="switchTab('qrcode')">QR코드 생성</button>
    </div>

    <!-- Workers Tab -->
    <div class="tab-content active" id="tab-workers">
      <div style="background: #f9fafb; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color);">
        <h3 style="margin-bottom: 15px;">새 근무자 추가</h3>
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="workerName" class="form-control" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label>전화번호</label>
          <input type="tel" id="workerPhone" class="form-control" placeholder="010-1234-5678">
        </div>
        <div class="form-group">
          <label>카카오톡 오픈채팅/채널 링크 (선택)</label>
          <input type="url" id="workerKakao" class="form-control" placeholder="https://open.kakao.com/o/...">
        </div>
        <button class="btn-primary" onclick="addWorker()">추가하기</button>
      </div>

      <h3>등록된 근무자</h3>
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>연락처</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="workerTableBody">
        </tbody>
      </table>
    </div>

    <!-- Schedule Tab -->
    <div class="tab-content" id="tab-schedule">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3>향후 14일 스케줄 (직접 선택)</h3>
        <span style="font-size: 0.85rem; color: var(--text-muted);">자동 저장됩니다.</span>
      </div>
      <div class="schedule-grid" id="scheduleGrid">
      </div>
    </div>

    <!-- QR Code Tab -->
    <div class="tab-content" id="tab-qrcode">
      <div style="background: #f9fafb; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color);">
        <h3 style="margin-bottom: 10px;">스마트폰 접속 주소(URL) 설정</h3>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">
          환자들이 스마트폰으로 접속할 수 있는 인터넷 주소(예: https://woorihospital.com)를 입력해주세요.
        </p>
        <div class="form-group">
          <input type="url" id="appUrl" class="form-control" placeholder="https://...">
        </div>
        <button class="btn-primary" onclick="generateQR()">QR코드 생성하기</button>
      </div>
      
      <div class="qr-container" style="min-height: 250px;">
        <div id="qrcode" style="display: inline-block; margin: 0 auto;">
          <p style="color: #9ca3af; padding: 40px 0;">주소를 입력하고 생성 버튼을 누르세요.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHGiDpi97LHL4aUbniIj3MMko7gfYMOTY",
      authDomain: "woorihospital-ffe09.firebaseapp.com",
      databaseURL: "https://woorihospital-ffe09-default-rtdb.firebaseio.com",
      projectId: "woorihospital-ffe09",
      storageBucket: "woorihospital-ffe09.firebasestorage.app",
      messagingSenderId: "270581745997",
      appId: "1:270581745997:web:ff9c20ed10b20d4134cf04",
      measurementId: "G-XHEP1YX016"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let workers = {};
    let schedules = {};

    // --- Public View Logic ---
    function updateDateDisplay() {
      const now = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('currentDateDisplay').textContent = now.toLocaleDateString('ko-KR', options);
    }

    function determineCurrentWorker() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const todayStr = `${yyyy}-${mm}-${dd}`;
      const hour = now.getHours();

      let shift = 'morning';
      if (hour >= 13) {
        shift = 'afternoon';
      }

      const todaySchedule = schedules[todayStr];
      if (!todaySchedule) return null;

      const workerId = todaySchedule[shift];
      if (!workerId) return null;

      return workers[workerId];
    }

    function renderPublicView() {
      const worker = determineCurrentWorker();
      const content = document.getElementById('publicContent');
      
      if (!worker) {
        content.innerHTML = `
          <div class="worker-card">
            <div class="worker-avatar" style="background: #FEE2E2; color: #EF4444;">✕</div>
            <div class="worker-name">근무자 없음</div>
            <div class="worker-role">현재 시간대에 등록된 근무자가 없습니다.</div>
          </div>
        `;
        return;
      }

      let buttonsHtml = `
        <a href="tel:${worker.phone}" class="btn btn-call">
          📞 전화 걸기
        </a>
        <a href="sms:${worker.phone}" class="btn btn-sms">
          💬 문자 보내기
        </a>
      `;

      if (worker.kakao) {
        buttonsHtml += `
          <a href="${worker.kakao}" target="_blank" class="btn btn-kakao">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 5px;">
              <path d="M12 3c-5.52 0-10 3.58-10 8 0 2.85 1.83 5.37 4.6 6.81-.3.94-1.07 3.32-1.12 3.5-.06.23.08.24.19.16.08-.06 2.5-1.63 3.49-2.31.9.15 1.84.24 2.84.24 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/>
            </svg> 카카오톡 문의
          </a>
        `;
      }

      content.innerHTML = `
        <div class="worker-card">
          <div class="worker-avatar">${worker.name.charAt(0)}</div>
          <div class="worker-name">${worker.name}</div>
          <div class="worker-role">담당 근무자</div>
        </div>
        <div class="action-buttons">
          ${buttonsHtml}
        </div>
      `;
    }

    // --- Data Loading ---
    const workersRef = ref(db, 'workers');
    onValue(workersRef, (snapshot) => {
      workers = snapshot.val() || {};
      renderWorkerTable();
      renderScheduleGrid();
      renderPublicView();
    });

    const schedulesRef = ref(db, 'schedules');
    onValue(schedulesRef, (snapshot) => {
      schedules = snapshot.val() || {};
      renderScheduleGrid();
      renderPublicView();
    });

    updateDateDisplay();

    // --- Admin Logic ---
    window.promptAdmin = () => {
      const pwd = prompt("관리자 비밀번호를 입력하세요 (기본: 1234)");
      if (pwd === "1234" || pwd === "admin") {
        document.getElementById('publicView').style.display = 'none';
        document.getElementById('adminView').style.display = 'block';
        
        // 레이아웃 변경
        document.body.style.alignItems = 'flex-start';
      } else if(pwd !== null) {
        alert("비밀번호가 틀렸습니다.");
      }
    };

    window.logoutAdmin = () => {
      document.getElementById('publicView').style.display = 'flex';
      document.getElementById('adminView').style.display = 'none';
      document.body.style.alignItems = 'center';
    };

    window.switchTab = (tabId) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(`tab-${tabId}`).classList.add('active');
    };

    window.addWorker = () => {
      const name = document.getElementById('workerName').value.trim();
      const phone = document.getElementById('workerPhone').value.trim();
      const kakao = document.getElementById('workerKakao').value.trim();

      if (!name || !phone) {
        alert("이름과 전화번호는 필수입니다.");
        return;
      }

      const newWorkerRef = push(ref(db, 'workers'));
      set(newWorkerRef, {
        name, phone, kakao
      }).then(() => {
        document.getElementById('workerName').value = '';
        document.getElementById('workerPhone').value = '';
        document.getElementById('workerKakao').value = '';
        alert("추가되었습니다.");
      });
    };

    window.deleteWorker = (id) => {
      if (confirm("정말 삭제하시겠습니까?")) {
        remove(ref(db, `workers/${id}`));
      }
    };

    function renderWorkerTable() {
      const tbody = document.getElementById('workerTableBody');
      tbody.innerHTML = '';
      for (const [id, worker] of Object.entries(workers)) {
        tbody.innerHTML += `
          <tr>
            <td>${worker.name}</td>
            <td>${worker.phone}</td>
            <td>
              <button class="btn-danger" onclick="deleteWorker('${id}')">삭제</button>
            </td>
          </tr>
        `;
      }
    }

    window.updateScheduleInline = (dateStr, shift, workerId) => {
      const schedule = schedules[dateStr] || { morning: '', afternoon: '' };
      schedule[shift] = workerId;
      set(ref(db, `schedules/${dateStr}`), schedule).catch(err => alert("저장 실패: " + err.message));
    };

    function renderScheduleGrid() {
      const grid = document.getElementById('scheduleGrid');
      grid.innerHTML = '';

      const buildOptions = (selectedId) => {
        let html = `<option value="" ${!selectedId ? 'selected' : ''}>-- 선택 안함 --</option>`;
        for (const [id, worker] of Object.entries(workers)) {
          html += `<option value="${id}" ${selectedId === id ? 'selected' : ''}>${worker.name}</option>`;
        }
        return html;
      };

      // 오늘부터 +13일 표시
      const today = new Date();
      for (let i = 0; i < 14; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() + i);
        
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const dateStr = `${yyyy}-${mm}-${dd}`;
        
        const schedule = schedules[dateStr] || {};
        const mSelected = schedule.morning || '';
        const aSelected = schedule.afternoon || '';

        const displayDate = `${mm}월 ${dd}일`;
        const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
        const isToday = i === 0;

        grid.innerHTML += `
          <div class="schedule-card" ${isToday ? 'style="border-color: var(--primary-color); border-width: 2px;"' : ''}>
            <h3 ${isToday ? 'style="color: var(--primary-color);"' : ''}>${displayDate} (${dayOfWeek})${isToday ? ' - 오늘' : ''}</h3>
            <div class="schedule-slot">
              <label>오전 (00~13시)</label>
              <select class="form-control" style="padding: 8px; font-size: 0.9rem;" onchange="updateScheduleInline('${dateStr}', 'morning', this.value)">
                ${buildOptions(mSelected)}
              </select>
            </div>
            <div class="schedule-slot">
              <label>오후 (13~24시)</label>
              <select class="form-control" style="padding: 8px; font-size: 0.9rem;" onchange="updateScheduleInline('${dateStr}', 'afternoon', this.value)">
                ${buildOptions(aSelected)}
              </select>
            </div>
          </div>
        `;
      }
    }

    let qrcodeInstance = null;
    window.generateQR = () => {
      let url = document.getElementById("appUrl").value.trim();
      
      if (!url) {
        const currentHref = window.location.href.split('?')[0].split('#')[0];
        if (currentHref.startsWith('file://')) {
          alert("스마트폰에서 접속 가능한 인터넷 주소(http:// 또는 https://)를 먼저 입력해주세요.\\n(로컬 파일 주소는 접속이 불가능합니다.)");
          return;
        }
        url = currentHref;
        document.getElementById("appUrl").value = url;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
         url = 'https://' + url;
         document.getElementById("appUrl").value = url;
      }

      const container = document.getElementById("qrcode");
      container.innerHTML = "";
      
      qrcodeInstance = new QRCode(container, {
        text: url,
        width: 200,
        height: 200,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });
    };

  </script>
</body>
</html>
